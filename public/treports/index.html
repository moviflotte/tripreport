<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapport d'audit des véhicules</title>
    <link rel="stylesheet" href="/treports/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="report-toolbar" aria-label="Contrôles du rapport">
        <div>
          <div class="title-row">
            <h1>Rapport d'audit des véhicules</h1>
            <span class="version-badge" aria-label="Version de l'application">v1.0.0</span>
          </div>
          <p id="reportSummary">Kilométrage et niveau de carburant par véhicule.</p>
        </div>

        <label class="date-control">
          <span>Date du rapport</span>
          <input id="reportDate" type="date" />
        </label>
      </section>

      <section class="report-surface" aria-label="Relevés des véhicules">
        <div class="table-header">
          <strong id="tableTitle">Relevés</strong>
          <button id="printReport" type="button">Imprimer</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Véhicule</th>
                <th scope="col">Kilométrage</th>
                <th scope="col">Niveau de carburant</th>
              </tr>
            </thead>
            <tbody id="reportRows"></tbody>
          </table>
        </div>

        <p id="emptyState" class="empty-state" hidden>
          Aucun relevé de véhicule n'existe pour cette date.
        </p>
      </section>
    </main>

    <script src="/treports/app.js"></script>
  </body>
</html>
